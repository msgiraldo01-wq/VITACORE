<!-- Estilos del módulo Inventario/Farmacia.
     Usa los design tokens de hc/base.html (--brand, --surface, --border...)
     para heredar la identidad Vitacore Y el modo oscuro automáticamente.
     Los mensajes flash NO se renderizan aquí: los muestra la base con SweetAlert. -->
<style>
  .inv-seccion { margin-bottom: 16px; }
  .inv-seccion h3 { margin: 0 0 12px; font-size: 15px; font-weight: 700; color: var(--text); }

  .inv-tabla { width:100%; border-collapse:collapse; font-size:13px; }
  .inv-tabla th { text-align:left; padding:10px 12px; color:var(--text-faint);
    font-weight:700; border-bottom:2px solid var(--border);
    text-transform:uppercase; font-size:10.5px; letter-spacing:.08em; }
  .inv-tabla td { padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text); }
  .inv-tabla tr:hover td { background: var(--surface-2); }
  .inv-tabla a { color: var(--brand); font-weight: 600; }
  body.dark-mode .inv-tabla a { color: var(--accent-light); }

  .inv-form { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:14px 20px; }
  .inv-campo label { display:block; font-weight:600; font-size:12.5px; color:var(--text); margin-bottom:6px; }
  .inv-campo input, .inv-campo select, .inv-campo textarea {
    width:100%; padding:9px 12px; border:1px solid var(--border);
    border-radius:var(--radius-sm); font:inherit; font-size:13px;
    background:var(--surface); color:var(--text); box-sizing:border-box;
    transition: border-color .15s, background .3s; }
  .inv-campo input:focus, .inv-campo select:focus, .inv-campo textarea:focus {
    outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }
  .inv-campo.completo { grid-column:1/-1; }
  .inv-ayuda { font-size:11.5px; color:var(--text-faint); margin-top:4px; }

  .inv-insignia { display:inline-block; padding:3px 10px; border-radius:var(--radius-pill);
    font-size:10.5px; font-weight:700; letter-spacing:.02em; }
  .inv-insignia.verde   { background:var(--success-soft); color:var(--success); }
  .inv-insignia.amarillo{ background:var(--warn-soft); color:var(--warn); }
  .inv-insignia.rojo    { background:var(--danger-soft); color:var(--danger); }
  .inv-insignia.gris    { background:var(--surface-3); color:var(--text-soft); }
  .inv-insignia.morado  { background:var(--accent-soft); color:var(--accent); }

  .inv-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px; margin-bottom:16px; }
  .inv-kpi { background:var(--surface-2); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:16px; transition:background .3s,border-color .3s; }
  .inv-kpi .valor { font-size:1.6rem; font-weight:800; color:var(--text); line-height:1; }
  .inv-kpi .titulo { font-size:11.5px; color:var(--text-soft); margin-top:6px; }
  .inv-kpi.alerta .valor { color:var(--danger); }
  .inv-kpi.aviso .valor { color:var(--warn); }

  .inv-filtros { display:flex; gap:12px; flex-wrap:wrap; align-items:end; margin-bottom:16px; }
  .inv-filtros .inv-campo { min-width:210px; }
  .inv-vacio { text-align:center; padding:36px; color:var(--text-soft); font-size:13.5px; }
  .inv-vacio a { color: var(--brand); font-weight:600; }
</style>
